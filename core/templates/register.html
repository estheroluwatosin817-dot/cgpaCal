<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <div class="login-container">
        <h2>Create Account</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter your username" required>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password1" name="password1" placeholder="Enter your password" required>
                <span class="toggle-eye" onclick="togglePassword('password1','eye1')">
                    <i id="eye1" class="fa-solid fa-eye"></i>
                </span>
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" id="password2" name="password2" placeholder="Confirm your password" required>
                <span class="toggle-eye" onclick="togglePassword('password2','eye2')">
                    <i id="eye2" class="fa-solid fa-eye"></i>
                </span>
            </div>

            <button type="submit">Register</button>
        </form>

        <div class="links">
            <a href="{% url 'login' %}">Already have an account? Login</a>
        </div>
    </div>

    <script>
        function togglePassword(fieldId, iconId) {
            const input = document.getElementById(fieldId);
            const icon = document.getElementById(iconId);
            const isHidden = input.type === "password";
            input.type = isHidden ? "text" : "password";
            icon.classList.toggle("fa-eye");
            icon.classList.toggle("fa-eye-slash");
        }
    </script>

</body>
</html>
