{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student CGPA Portal</title>

<link rel="stylesheet" href="{% static 'dashboard.css' %}">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
</head>

<body>

<div class="top-bar">
  <div class="title">CGPA Student Portal</div>

  <div class="right">
    <span class="user">{{ username }}</span>
    <a href="{% url 'logout' %}" class="logout">Logout</a>
  </div>
</div>

<div class="dashboard-box">

<!-- PROFILE -->
<div class="card">
  <h3>Student Profile</h3>

  <input id="fullName" placeholder="Full Name">
  <input id="matricNumber" placeholder="Matric Number">

  <select id="faculty">
    <option value="">Faculty</option>
    <option>Engineering</option>
    <option>Science</option>
    <option>Management</option>
    <option>Arts</option>
  </select>

  <select id="department">
    <option value="">Department</option>
    <option>Computer Science</option>
    <option>Software Engineering</option>
    <option>Cyber Security</option>
  </select>

  <select id="program">
    <option value="">Program</option>
    <option>BSc</option>
    <option>HND</option>
    <option>ND</option>
  </select>
</div>

<!-- ACADEMIC -->
<div class="card">
  <h3>Academic Records</h3>

  <div id="levels-container"></div>

  <button class="btn-add" onclick="addLevel()">Add Level</button>

  <div class="actions">
    <button id="calcBtn" onclick="calculateCGPA()">Calculate CGPA</button>
  </div>

  <div id="result"></div>

  <div id="downloadArea">
    <button id="downloadBtn" onclick="downloadPDF()">Download PDF</button>
  </div>

</div>

</div>

<script>

let levels = [100,200,300,400,500];
let cgpaResult = 0;
let classification = "";

/* LEVEL */
function addLevel() {
  const container = document.getElementById("levels-container");

  let used = [...container.querySelectorAll(".level")]
    .map(l => parseInt(l.dataset.level));

  let next = levels.find(l => !used.includes(l));
  if (!next) return;

  const level = document.createElement("div");
  level.className = "level";
  level.dataset.level = next;

  level.innerHTML = `
    <div class="level-header">
      <h4>${next} Level</h4>
      <button onclick="addSemester(${next})">Add Semester</button>
    </div>

    <div id="level-${next}-semesters"></div>
  `;

  container.appendChild(level);
}

/* SEMESTER */
function addSemester(levelId) {
  const container = document.getElementById(`level-${levelId}-semesters`);

  if (container.children.length >= 2) return;

  const semId = container.children.length + 1;

  const semester = document.createElement("div");
  semester.className = "semester";

  semester.innerHTML = `
    <div class="semester-header">
      <h5>Semester ${semId}</h5>

      <!-- FIX: aligned buttons -->
      <div class="btn-group">
        <button onclick="addCourse('l${levelId}s${semId}')">Add Course</button>
        <button onclick="this.closest('.semester').remove()">Remove Semester</button>
      </div>
    </div>

    <div id="l${levelId}s${semId}"></div>
  `;

  container.appendChild(semester);
}


/* COURSE (UNIT 1–3 STRICT) */
function addCourse(id) {
  const box = document.getElementById(id);

  const row = document.createElement("div");
  row.className = "course-row";

  row.innerHTML = `
    <input placeholder="Course Title">
    <input placeholder="Course Code">

    <input type="number" min="1" max="3" placeholder="Unit" required>

    <select>
      <option value="">Grade</option>
      <option>A</option>
      <option>B</option>
      <option>C</option>
      <option>D</option>
      <option>E</option>
      <option>F</option>
    </select>

    <button onclick="this.parentElement.remove()">Remove Course</button>
  `;

  box.appendChild(row);
}

/* CGPA */
function calculateCGPA() {

  let totalUnits = 0;
  let totalPoints = 0;

  const map = {A:5,B:4,C:3,D:2,E:1,F:0};

  document.querySelectorAll(".course-row").forEach(r => {
    const unit = parseFloat(r.children[2].value);
    const grade = r.children[3].value;

    if (!isNaN(unit) && unit >= 1 && unit <= 3 && grade) {
      totalUnits += unit;
      totalPoints += unit * map[grade];
    }
  });

  cgpaResult = totalUnits ? (totalPoints / totalUnits) : 0;

  if (cgpaResult >= 4.5) classification = "First Class";
  else if (cgpaResult >= 3.5) classification = "Second Class Upper";
  else if (cgpaResult >= 2.5) classification = "Second Class Lower";
  else if (cgpaResult >= 1.5) classification = "Third Class";
  else classification = "Fail";

  document.getElementById("result").innerHTML = `
    <h3>CGPA RESULT</h3>
    <p><b>Total Units:</b> ${totalUnits}</p>
    <p><b>Total Grade Points:</b> ${totalPoints}</p>
    <p><b>CGPA:</b> ${cgpaResult.toFixed(2)}</p>
    <p><b>Remark:</b> ${classification}</p>
  `;

  document.getElementById("calcBtn").style.display = "none";
  document.getElementById("downloadArea").style.display = "flex";
}

/* PDF (FINAL FIXED VERSION) */
function downloadPDF() {

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const name = document.getElementById("fullName").value || "student";
  const matric = document.getElementById("matricNumber").value;
  const faculty = document.getElementById("faculty").value;
  const dept = document.getElementById("department").value;
  const program = document.getElementById("program").value;

  doc.setFont("times", "bold");
  doc.setFontSize(16);
  doc.text("STUDENT CGPA REPORT", 60, 15);

  doc.setFont("times", "normal");
  doc.setFontSize(11);

  doc.text(`Name: ${name}`, 10, 30);
  doc.text(`Matric No: ${matric}`, 10, 38);
  doc.text(`Faculty: ${faculty}`, 10, 46);
  doc.text(`Department: ${dept}`, 10, 54);
  doc.text(`Program: ${program}`, 10, 62);

  let tableData = [];
  let sn = 1;

  document.querySelectorAll(".course-row").forEach(r => {
    tableData.push([
      sn++,
      r.children[0].value,
      r.children[1].value,
      r.children[2].value,
      r.children[3].value
    ]);
  });

  doc.autoTable({
    head: [["S/N","Course Title","Code","Unit","Grade"]],
    body: tableData,
    startY: 70,

    styles: {
      font: "times"
    },

    headStyles: {
      fillColor: [101, 67, 33], // brown
      textColor: 255
    },

    alternateRowStyles: {
      fillColor: [245, 240, 235]
    }
  });

  let y = doc.lastAutoTable.finalY + 10;

  doc.setFont("times", "bold");
  doc.text(`CGPA: ${cgpaResult.toFixed(2)}`, 10, y);
  doc.text(`Remark: ${classification}`, 10, y + 10);

  let cleanName = name.replace(/\s+/g, "_");
  doc.save(`${cleanName}_cgpa_report.pdf`);
}

</script>

</body>
</html>
